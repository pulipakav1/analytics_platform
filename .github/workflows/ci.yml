name: Treasury Analytics CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt ruff pytest-cov

      - name: Lint with ruff
        run: ruff check app/ tests/ dags/

      - name: Validate Pandera schemas
        run: python -c "from app.data.schema import RAW_SCHEMA, CURATED_SCHEMA; print('Schemas OK')"

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: coverage.xml

  dag-validate:
    name: Validate Airflow DAG
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Airflow + project deps
        run: |
          pip install apache-airflow==2.9.3 --constraint \
            "https://raw.githubusercontent.com/apache/airflow/constraints-2.9.3/constraints-3.11.txt"
          pip install -r requirements.txt

      - name: Parse DAG (import check)
        run: python -c "from dags.treasury_pipeline_dag import dag; print('DAG OK:', dag.dag_id)"
